<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Registry — Observatory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --text: #e8e4d8;
    --muted: rgba(232,228,216,0.45);
    --accent: #a78bfa;
    --surface: rgba(4,6,15,0.88);
    --border: rgba(255,255,255,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #020408; cursor: none; }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #cursor-ring {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    transition: opacity 0.2s;
  }

  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    z-index: 40;
    background: linear-gradient(to bottom, rgba(2,4,8,0.7) 0%, transparent 100%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    opacity: 0.7;
  }

  .obs-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    border: 0.5px solid rgba(255,255,255,0.1);
    padding: 4px 10px;
    border-radius: 99px;
  }

  #star-count {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(232,228,216,0.25);
    z-index: 40;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  #star-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding: 24px 28px 32px;
    z-index: 60;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    max-width: 520px;
    margin: 0 auto;
    border-radius: 20px 20px 0 0;
  }

  #star-panel.open { transform: translateY(0); }

  .panel-handle {
    width: 36px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    margin: 0 auto 20px;
    cursor: pointer;
  }

  .panel-color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px currentColor;
  }

  .panel-star-name {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 4px;
  }

  .panel-creator {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .panel-desc {
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(232,228,216,0.8);
    margin-bottom: 20px;
  }

  .panel-physics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .phys-chip {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
  }

  .phys-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .phys-val {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
  }

  .close-btn {
    position: absolute;
    top: 18px; right: 20px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    transition: background 0.15s;
  }

  .close-btn:hover { background: rgba(255,255,255,0.1); }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: #020408;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 200;
    transition: opacity 0.8s;
  }

  .loading-logo {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 300;
    color: rgba(232,228,216,0.6);
  }

  .loading-dots {
    display: flex; gap: 6px;
  }

  .loading-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(232,228,216,0.3);
    animation: dot-pulse 1.4s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.3); }
  }

  #add-star-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: rgba(4,6,15,0.8);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(232,228,216,0.6);
    cursor: pointer;
    z-index: 40;
    transition: border-color 0.2s, color 0.2s;
  }

  #add-star-btn:hover { border-color: rgba(167,139,250,0.5); color: var(--text); }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div id="loading-screen">
  <div class="loading-logo">Stellar Registry</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div id="cursor-ring">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="18" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <circle cx="20" cy="20" r="1.5" fill="rgba(232,228,216,0.6)"/>
    <line x1="20" y1="2" x2="20" y2="8" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <line x1="20" y1="32" x2="20" y2="38" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <line x1="2" y1="20" x2="8" y2="20" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <line x1="32" y1="20" x2="38" y2="20" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
  </svg>
</div>

<div id="top-bar">
  <div class="logo">Stellar Registry</div>
  <div id="star-count"></div>
  <div class="obs-tag">Observatory</div>
</div>

<div id="hint">Move your detector — click to identify a star</div>

<div id="star-panel">
  <div class="panel-handle" onclick="closePanel()"></div>
  <div class="close-btn" onclick="closePanel()">✕</div>
  <div class="panel-star-name" id="p-name">—</div>
  <div class="panel-creator" id="p-creator">by —</div>
  <div class="panel-desc" id="p-desc"></div>
  <div class="panel-physics" id="p-physics"></div>
</div>

<button id="add-star-btn" onclick="window.open('star-editor.html','_blank')">+ Add Your Star</button>

<script>
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H;
let mouse = { x: -999, y: -999 };
let t = 0;
let registeredStars = [];
let bgStars = [];
let shootingStars = [];
let hoveredStar = null;
let panelOpen = false;
let loadInterval;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildBgStars();
}

function buildBgStars() {
  bgStars = [];
  const n = Math.floor(W * H / 1200);
  for (let i = 0; i < n; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 0.9 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.00008 + 0.00002,
      drift: (Math.random() - 0.5) * 0.015,
      brightness: Math.random() * 0.5 + 0.3
    });
  }
}

function spawnShootingStar() {
  if (Math.random() > 0.004) return;
  const fromLeft = Math.random() > 0.5;
  shootingStars.push({
    x: fromLeft ? -20 : W + 20,
    y: Math.random() * H * 0.5,
    vx: fromLeft ? (3 + Math.random() * 4) : -(3 + Math.random() * 4),
    vy: 1.5 + Math.random() * 2,
    len: 80 + Math.random() * 120,
    alpha: 1,
    life: 1
  });
}

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3),16),
    g: parseInt(hex.slice(3,5),16),
    b: parseInt(hex.slice(5,7),16)
  };
}

function drawRegisteredStar(star, screenX, screenY, highlight) {
  const rgb = hexToRgb(star.color || '#a78bfa');
  const p = star.physics || {};
  const scatter = (p.scatter || 60) * 0.12;
  const lum = p.lum || 0.8;
  const twinkle = p.twinkle || 0.5;
  const density = p.density || 0.6;

  const twinkleFactor = 0.7 + 0.3 * Math.sin(t * 0.015 * (1 + twinkle * 2) + (star._phase || 0));
  const alpha = lum * twinkleFactor;

  // Nebula haze
  if (p.haze > 0.05) {
    const ng = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scatter * 2.5);
    ng.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${(p.haze||0.3) * 0.18 * alpha})`);
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng;
    ctx.beginPath();
    ctx.ellipse(screenX, screenY, scatter * 2.8, scatter * 1.8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mini particles
  const particleCount = Math.min((p.count || 80), 60);
  const starParticles = star._particles || [];
  if (starParticles.length === 0) {
    for (let i = 0; i < particleCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const rawR = Math.pow(Math.random(), 1 / density);
      const r = rawR * scatter;
      const armOffset = (p.twist || 0.4) * rawR * Math.PI * 3;
      starParticles.push({
        bx: Math.cos(angle + armOffset) * r,
        by: Math.sin(angle + armOffset) * r * 0.6,
        pr: Math.random() * 0.8 + 0.2,
        speed: (Math.random() * 0.5 + 0.5) * (p.speed || 0.5) * 0.008,
        phase: Math.random() * Math.PI * 2,
        depth: Math.random()
      });
    }
    star._particles = starParticles;
  }

  for (const sp of starParticles) {
    const orbit = t * sp.speed;
    const px = screenX + sp.bx * Math.cos(orbit) - sp.by * Math.sin(orbit) * 0.5;
    const py = screenY + sp.bx * Math.sin(orbit) * 0.4 + sp.by * Math.cos(orbit);
    const a = alpha * (0.4 + sp.depth * 0.5) * twinkleFactor;
    ctx.beginPath();
    ctx.arc(px, py, sp.pr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${a})`;
    ctx.fill();
  }

  // Core glow
  const cg = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scatter * 0.8);
  cg.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha * 0.8})`);
  cg.addColorStop(0.4, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha * 0.3})`);
  cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(screenX, screenY, scatter * 0.9, 0, Math.PI * 2);
  ctx.fill();

  // White hot center
  ctx.beginPath();
  ctx.arc(screenX, screenY, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
  ctx.fill();

  // Hover ring
  if (highlight) {
    ctx.beginPath();
    ctx.arc(screenX, screenY, scatter * 2.2, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Name label above
    ctx.font = '11px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(232,228,216,0.7)`;
    ctx.fillText(star.name, screenX, screenY - scatter * 2.5 - 6);
  }
}

function draw() {
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, W, H);

  // Background stars
  for (const s of bgStars) {
    s.x += s.drift;
    if (s.x > W + 2) s.x = -2;
    if (s.x < -2) s.x = W + 2;

    const tw = 0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase);
    const a = s.brightness * tw;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,228,216,${a})`;
    ctx.fill();
  }

  // Shooting stars
  spawnShootingStar();
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.x += ss.vx;
    ss.y += ss.vy;
    ss.life -= 0.018;
    ss.alpha = ss.life;

    if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }

    const trail = ctx.createLinearGradient(
      ss.x - ss.vx * (ss.len / Math.hypot(ss.vx, ss.vy)),
      ss.y - ss.vy * (ss.len / Math.hypot(ss.vx, ss.vy)),
      ss.x, ss.y
    );
    trail.addColorStop(0, 'rgba(232,228,216,0)');
    trail.addColorStop(1, `rgba(232,228,216,${ss.alpha * 0.8})`);
    ctx.beginPath();
    ctx.moveTo(ss.x - ss.vx * (ss.len / Math.hypot(ss.vx, ss.vy)),
               ss.y - ss.vy * (ss.len / Math.hypot(ss.vx, ss.vy)));
    ctx.lineTo(ss.x, ss.y);
    ctx.strokeStyle = trail;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // Registered stars
  hoveredStar = null;
  for (const star of registeredStars) {
    const sx = star.x * W;
    const sy = star.y * H;
    const dist = Math.hypot(mouse.x - sx, mouse.y - sy);
    const scatter = ((star.physics?.scatter || 60) * 0.12) * 2.2;
    const isHover = dist < Math.max(scatter, 30) && !panelOpen;
    if (isHover) hoveredStar = star;
    drawRegisteredStar(star, sx, sy, isHover);
  }

  // Update cursor ring
  const ring = document.getElementById('cursor-ring');
  ring.style.left = mouse.x + 'px';
  ring.style.top = mouse.y + 'px';

  if (hoveredStar) {
    ring.style.opacity = '0.8';
    document.body.style.cursor = 'none';
  } else {
    ring.style.opacity = '0.4';
  }

  t++;
  requestAnimationFrame(draw);
}

// Mouse / touch
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

document.addEventListener('click', e => {
  if (panelOpen) return;
  if (hoveredStar) openPanel(hoveredStar);
});

// Touch for mobile
document.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const tx = e.changedTouches[0].clientX;
  const ty = e.changedTouches[0].clientY;
  for (const star of registeredStars) {
    const sx = star.x * W;
    const sy = star.y * H;
    const dist = Math.hypot(tx - sx, ty - sy);
    if (dist < 50) { openPanel(star); return; }
  }
  if (panelOpen) closePanel();
});

function openPanel(star) {
  panelOpen = true;
  const rgb = hexToRgb(star.color || '#a78bfa');
  const p = star.physics || {};

  document.getElementById('p-name').textContent = star.name;
  document.getElementById('p-creator').innerHTML =
    `<span class="panel-color-dot" style="background:${star.color};color:${star.color}"></span>` +
    `by ${star.creator}`;
  document.getElementById('p-desc').textContent = star.description;

  const phys = document.getElementById('p-physics');
  phys.innerHTML = [
    ['Particles', Math.round(p.count || 80)],
    ['Speed', (p.speed||0.5).toFixed(2)],
    ['Scatter', Math.round(p.scatter||60)],
    ['Density', (p.density||0.6).toFixed(2)],
  ].map(([l, v]) => `
    <div class="phys-chip">
      <div class="phys-label">${l}</div>
      <div class="phys-val">${v}</div>
    </div>`).join('');

  document.getElementById('star-panel').classList.add('open');
  document.getElementById('hint').style.opacity = '0';
}

function closePanel() {
  panelOpen = false;
  document.getElementById('star-panel').classList.remove('open');
  document.getElementById('hint').style.opacity = '1';
}

// Load stars from storage
async function loadStars() {
  try {
    const result = await window.storage?.get('stellar-registry-stars', true);
    if (result?.value) {
      const loaded = JSON.parse(result.value);
      // Initialize phases
      loaded.forEach(s => {
        if (!s._phase) s._phase = Math.random() * Math.PI * 2;
      });
      registeredStars = loaded;
      const cnt = registeredStars.length;
      document.getElementById('star-count').textContent =
        cnt > 0 ? `${cnt} star${cnt !== 1 ? 's' : ''} registered` : 'No stars yet';
    }
  } catch(e) {}
}

// Hide loading screen
function hideLoading() {
  const ls = document.getElementById('loading-screen');
  ls.style.opacity = '0';
  setTimeout(() => ls.style.display = 'none', 800);
}

window.addEventListener('resize', resize);
resize();
draw();

// Load after short delay so canvas is running
setTimeout(async () => {
  await loadStars();
  hideLoading();
  // Refresh every 15 seconds
  setInterval(loadStars, 15000);
}, 1000);

// Hint fade
setTimeout(() => {
  document.getElementById('hint').style.transition = 'opacity 1.5s';
  document.getElementById('hint').style.opacity = '0';
}, 6000);
</script>
</body>
</html>
