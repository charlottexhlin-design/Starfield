<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
<title>Stellar Registry — Observatory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --text: #e8e4d8;
    --muted: rgba(232,228,216,0.45);
    --accent: #a78bfa;
    --surface: rgba(4,6,15,0.88);
    --border: rgba(255,255,255,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #020408; cursor: none; }
  canvas { display: block; width: 100%; height: 100%; }

  #cursor-ring {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    transition: opacity 0.2s;
  }

  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    z-index: 40;
    background: linear-gradient(to bottom, rgba(2,4,8,0.75) 0%, transparent 100%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    opacity: 0.7;
  }

  .obs-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    border: 0.5px solid rgba(255,255,255,0.1);
    padding: 4px 10px;
    border-radius: 99px;
  }

  #star-count {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(232,228,216,0.2);
    z-index: 40;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 2s;
  }

  #star-panel {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 540px;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    border-left: 0.5px solid var(--border);
    border-right: 0.5px solid var(--border);
    padding: 20px 28px 36px;
    z-index: 60;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px 20px 0 0;
  }

  #star-panel.open { transform: translateX(-50%) translateY(0); }

  .panel-handle {
    width: 36px; height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 99px;
    margin: 0 auto 20px;
    cursor: pointer;
  }

  .panel-color-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
  }

  .panel-star-name {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 30px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.1;
  }

  .panel-creator {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .panel-desc {
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(232,228,216,0.78);
    margin-bottom: 20px;
  }

  .panel-physics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .phys-chip {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
  }

  .phys-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .phys-val {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
  }

  .close-btn {
    position: absolute;
    top: 18px; right: 20px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    transition: background 0.15s;
  }

  .close-btn:hover { background: rgba(255,255,255,0.1); }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: #020408;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 200;
    transition: opacity 0.8s;
  }

  .loading-logo {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 30px;
    font-weight: 300;
    color: rgba(232,228,216,0.55);
  }

  .loading-sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(232,228,216,0.2);
  }

  .loading-dots { display: flex; gap: 8px; }

  .loading-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(232,228,216,0.3);
    animation: dpulse 1.4s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dpulse {
    0%,80%,100% { opacity:0.3; transform:scale(1); }
    40% { opacity:1; transform:scale(1.4); }
  }

  #new-star-toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(4,6,15,0.92);
    border: 0.5px solid rgba(167,139,250,0.4);
    border-radius: 99px;
    padding: 8px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: rgba(167,139,250,0.9);
    z-index: 80;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    pointer-events: none;
    white-space: nowrap;
  }

  #new-star-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div id="loading-screen">
  <div class="loading-logo">Stellar Registry</div>
  <div class="loading-sub">Connecting to the observatory</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div id="cursor-ring">
  <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="19" stroke="rgba(232,228,216,0.25)" stroke-width="0.5"/>
    <circle cx="22" cy="22" r="1.5" fill="rgba(232,228,216,0.5)"/>
    <line x1="22" y1="2" x2="22" y2="9" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <line x1="22" y1="35" x2="22" y2="42" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <line x1="2" y1="22" x2="9" y2="22" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
    <line x1="35" y1="22" x2="42" y2="22" stroke="rgba(232,228,216,0.3)" stroke-width="0.5"/>
  </svg>
</div>

<div id="top-bar">
  <div class="logo">Stellar Registry</div>
  <div id="star-count"></div>
  <div class="obs-tag">Observatory</div>
</div>

<div id="hint">Move your detector across the sky — click any star to identify it</div>

<div id="star-panel">
  <div class="panel-handle" onclick="closePanel()"></div>
  <div class="close-btn" onclick="closePanel()">✕</div>
  <div class="panel-star-name" id="p-name"></div>
  <div class="panel-creator" id="p-creator"></div>
  <div class="panel-desc" id="p-desc"></div>
  <div class="panel-physics" id="p-physics"></div>
</div>

<div id="new-star-toast"></div>

<script>
var SUPABASE_URL = 'https://xdvztmxhfzeugxumdlwh.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhkdnp0bXhoZnpldWd4dW1kbHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzA5MzMsImV4cCI6MjA5MjUwNjkzM30.t_KiA17-MRHvlHVoxBEHdvJW7KWfPk6Gwn8_ZyfIeTI';

var canvas = document.getElementById('sky');
var ctx = canvas.getContext('2d');
var W, H, t = 0;
var mouse = { x: -999, y: -999 };
var registeredStars = [];
var bgStars = [];
var shootingStars = [];
var hoveredStar = null;
var panelOpen = false;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildBgStars();
}

function buildBgStars() {
  bgStars = [];
  var n = Math.floor(W * H / 1100);
  for (var i = 0; i < n; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 0.85 + 0.15,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.00007 + 0.00002,
      drift: (Math.random()-0.5) * 0.012,
      brightness: Math.random() * 0.45 + 0.25
    });
  }
}

function hexToRgb(hex) {
  if (!hex || hex.length < 7) return {r:167,g:139,b:250};
  return {
    r: parseInt(hex.slice(1,3), 16),
    g: parseInt(hex.slice(3,5), 16),
    b: parseInt(hex.slice(5,7), 16)
  };
}

function spawnShootingStar() {
  if (Math.random() > 0.003) return;
  var fromLeft = Math.random() > 0.5;
  shootingStars.push({
    x: fromLeft ? -20 : W+20,
    y: Math.random() * H * 0.55,
    vx: fromLeft ? (2.5+Math.random()*3.5) : -(2.5+Math.random()*3.5),
    vy: 1.2 + Math.random()*1.8,
    len: 70 + Math.random()*110,
    life: 1
  });
}

function getStarScreenPos(star) {
  return { x: star.x * W, y: star.y * H };
}

function getStarRadius(star) {
  var scatter = star.physics ? (star.physics.scatter || 60) : 60;
  return Math.max(scatter * 0.12 * 2.5, 28);
}

function drawRegisteredStar(star, highlight) {
  var pos = getStarScreenPos(star);
  var sx = pos.x, sy = pos.y;
  var rgb = hexToRgb(star.color);
  var p = star.physics || {};
  var scatter = (p.scatter || 60) * 0.12;
  var lum = p.lum || 0.8;
  var twinkle = p.twinkle || 0.5;
  var density = p.density || 0.6;
  var tw = 0.7 + 0.3 * Math.sin(t * 0.015 * (1 + twinkle*2) + (star._phase||0));
  var alpha = lum * tw;

  if ((p.haze||0) > 0.05) {
    var ng = ctx.createRadialGradient(sx, sy, 0, sx, sy, scatter*2.8);
    ng.addColorStop(0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+((p.haze||0.3)*0.16*alpha)+')');
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng;
    ctx.beginPath();
    ctx.ellipse(sx, sy, scatter*3.2, scatter*2, 0, 0, Math.PI*2);
    ctx.fill();
  }

  if (!star._particles) {
    var pCount = Math.min(p.count||80, 55);
    star._particles = [];
    for (var i = 0; i < pCount; i++) {
      var angle = Math.random()*Math.PI*2;
      var rawR = Math.pow(Math.random(), 1/density);
      var r = rawR * scatter;
      var fa = angle + (p.twist||0.4)*rawR*Math.PI*3;
      star._particles.push({
        bx: Math.cos(fa)*r, by: Math.sin(fa)*r*0.6,
        pr: Math.random()*0.8+0.2,
        speed: (Math.random()*0.5+0.5)*(p.speed||0.5)*0.008,
        depth: Math.random()
      });
    }
  }

  for (var j = 0; j < star._particles.length; j++) {
    var sp = star._particles[j];
    var o = t * sp.speed;
    var px = sx + sp.bx*Math.cos(o) - sp.by*Math.sin(o)*0.5;
    var py = sy + sp.bx*Math.sin(o)*0.4 + sp.by*Math.cos(o);
    var a = alpha * (0.4 + sp.depth*0.5) * tw;
    ctx.beginPath(); ctx.arc(px, py, sp.pr, 0, Math.PI*2);
    ctx.fillStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+a+')'; ctx.fill();
  }

  var cg = ctx.createRadialGradient(sx, sy, 0, sx, sy, scatter*0.9);
  cg.addColorStop(0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(alpha*0.85)+')');
  cg.addColorStop(0.4, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(alpha*0.3)+')');
  cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(sx, sy, scatter*0.95, 0, Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.arc(sx, sy, 1.8, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,'+(alpha*0.95)+')'; ctx.fill();

  if (highlight) {
    ctx.beginPath(); ctx.arc(sx, sy, getStarRadius(star), 0, Math.PI*2);
    ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.45)';
    ctx.lineWidth = 0.5; ctx.stroke();
    ctx.font = '11px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(232,228,216,0.75)';
    ctx.fillText(star.name, sx, sy - getStarRadius(star) - 8);
  }
}

function draw() {
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, W, H);

  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    s.x += s.drift;
    if (s.x > W+2) s.x = -2;
    if (s.x < -2) s.x = W+2;
    var tw = 0.55 + 0.45*Math.sin(t*s.speed*60+s.phase);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(232,228,216,'+(s.brightness*tw)+')'; ctx.fill();
  }

  spawnShootingStar();
  for (var k = shootingStars.length-1; k >= 0; k--) {
    var ss = shootingStars[k];
    ss.x += ss.vx; ss.y += ss.vy; ss.life -= 0.016;
    if (ss.life <= 0) { shootingStars.splice(k,1); continue; }
    var spd = Math.hypot(ss.vx, ss.vy);
    var trail = ctx.createLinearGradient(
      ss.x - ss.vx*(ss.len/spd), ss.y - ss.vy*(ss.len/spd), ss.x, ss.y
    );
    trail.addColorStop(0, 'rgba(232,228,216,0)');
    trail.addColorStop(1, 'rgba(232,228,216,'+(ss.life*0.75)+')');
    ctx.beginPath();
    ctx.moveTo(ss.x - ss.vx*(ss.len/spd), ss.y - ss.vy*(ss.len/spd));
    ctx.lineTo(ss.x, ss.y);
    ctx.strokeStyle = trail; ctx.lineWidth = 1.2; ctx.stroke();
  }

  hoveredStar = null;
  for (var m = 0; m < registeredStars.length; m++) {
    var star = registeredStars[m];
    var pos = getStarScreenPos(star);
    var dist = Math.hypot(mouse.x-pos.x, mouse.y-pos.y);
    var isHover = dist < getStarRadius(star) && !panelOpen;
    if (isHover) hoveredStar = star;
    drawRegisteredStar(star, isHover);
  }

  var ring = document.getElementById('cursor-ring');
  ring.style.left = mouse.x+'px';
  ring.style.top = mouse.y+'px';
  ring.style.opacity = hoveredStar ? '1' : '0.35';

  t++; requestAnimationFrame(draw);
}

document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
document.addEventListener('click', function() { if (!panelOpen && hoveredStar) openPanel(hoveredStar); });

document.addEventListener('touchmove', function(e) {
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
}, { passive:true });

document.addEventListener('touchend', function(e) {
  var tx = e.changedTouches[0].clientX;
  var ty = e.changedTouches[0].clientY;
  if (panelOpen) { closePanel(); return; }
  for (var i = 0; i < registeredStars.length; i++) {
    var pos = getStarScreenPos(registeredStars[i]);
    if (Math.hypot(tx-pos.x, ty-pos.y) < 55) { openPanel(registeredStars[i]); return; }
  }
});

function makeChip(label, value) {
  var div = document.createElement('div');
  div.className = 'phys-chip';
  var lDiv = document.createElement('div');
  lDiv.className = 'phys-label';
  lDiv.textContent = label;
  var vDiv = document.createElement('div');
  vDiv.className = 'phys-val';
  vDiv.textContent = value;
  div.appendChild(lDiv);
  div.appendChild(vDiv);
  return div;
}

function openPanel(star) {
  panelOpen = true;
  var p = star.physics || {};
  document.getElementById('p-name').textContent = star.name;

  var creator = document.getElementById('p-creator');
  creator.innerHTML = '';
  var dot = document.createElement('span');
  dot.className = 'panel-color-dot';
  dot.style.background = star.color;
  dot.style.boxShadow = '0 0 6px ' + star.color;
  creator.appendChild(dot);
  creator.appendChild(document.createTextNode('by ' + star.creator));

  document.getElementById('p-desc').textContent = star.description || '';

  var phys = document.getElementById('p-physics');
  phys.innerHTML = '';
  phys.appendChild(makeChip('Particles', Math.round(p.count||80)));
  phys.appendChild(makeChip('Speed', (p.speed||0.5).toFixed(2)));
  phys.appendChild(makeChip('Scatter', Math.round(p.scatter||60)));
  phys.appendChild(makeChip('Density', (p.density||0.6).toFixed(2)));

  document.getElementById('star-panel').classList.add('open');
  document.getElementById('hint').style.opacity = '0';
}

function closePanel() {
  panelOpen = false;
  document.getElementById('star-panel').classList.remove('open');
  document.getElementById('hint').style.opacity = '1';
}

function showNewStarToast(name) {
  var el = document.getElementById('new-star-toast');
  el.textContent = '\u2736 ' + name + ' just appeared in the sky';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

function updateCount() {
  var n = registeredStars.length;
  document.getElementById('star-count').textContent =
    n > 0 ? n + ' star' + (n!==1?'s':'') + ' in the registry' : '';
}

function loadStars() {
  fetch(SUPABASE_URL + '/rest/v1/stars?select=*&order=created_at.asc', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  }).then(function(res) {
    if (!res.ok) throw new Error('fetch failed');
    return res.json();
  }).then(function(data) {
    registeredStars = data.map(function(s) {
      s._phase = Math.random() * Math.PI * 2;
      return s;
    });
    updateCount();
  }).catch(function(e) { console.error('Load failed:', e); });
}

function connectRealtime() {
  var wsUrl = SUPABASE_URL.replace('https://', 'wss://') +
    '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0';
  var ws;
  var heartbeatTimer;

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = function() {
      ws.send(JSON.stringify({
        topic: 'realtime:public:stars',
        event: 'phx_join',
        payload: {
          config: {
            broadcast: { self: false },
            presence: { key: '' },
            postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'stars' }]
          }
        },
        ref: '1'
      }));
      heartbeatTimer = setInterval(function() {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: null }));
        }
      }, 25000);
    };

    ws.onmessage = function(msg) {
      try {
        var data = JSON.parse(msg.data);
        if (data.event === 'postgres_changes' &&
            data.payload && data.payload.data && data.payload.data.type === 'INSERT') {
          var newStar = data.payload.data.record;
          newStar._phase = Math.random() * Math.PI * 2;
          registeredStars.push(newStar);
          updateCount();
          showNewStarToast(newStar.name);
        }
      } catch(e) {}
    };

    ws.onclose = function() {
      clearInterval(heartbeatTimer);
      setTimeout(connect, 5000);
    };

    ws.onerror = function() { ws.close(); };
  }

  connect();
}

function hideLoading() {
  var ls = document.getElementById('loading-screen');
  ls.style.opacity = '0';
  setTimeout(function() { ls.style.display='none'; }, 800);
}

window.addEventListener('resize', resize);
resize(); draw();

setTimeout(function() {
  loadStars();
  connectRealtime();
  hideLoading();
  setTimeout(function() {
    document.getElementById('hint').style.opacity = '0';
  }, 7000);
}, 800);
</script>
</body>
</html>
